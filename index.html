<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar Conta</title>
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-200 min-h-screen flex items-center justify-center">

  <!-- Card principal -->
  <main class="bg-red-500 w-full max-w-sm rounded-lg px-10 py-16 flex flex-col items-center gap-6 shadow-xl">

    <!-- Título -->
    <h1 class="text-white text-5xl font-light tracking-wide">
      Criar Conta
    </h1>

    <!-- Botões de redes sociais -->
    <div class="flex items-center gap-4">

      <!-- Facebook -->
      <button class="bg-white w-12 h-12 rounded-full flex items-center justify-center shadow hover:scale-110 transition-transform">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="black">
          <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.886v2.267h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
        </svg>
      </button>

      <!-- Google -->
      <button class="bg-red-500 w-14 h-14 rounded-full flex items-center justify-center hover:scale-110 transition-transform ring-4 ring-white" style="box-shadow: 0 8px 24px rgba(0,0,0,0.5);">
        <span class="text-white font-bold text-2xl">G</span>
      </button>

      <!-- LinkedIn -->
      <button class="bg-white w-12 h-12 rounded-full flex items-center justify-center shadow hover:scale-110 transition-transform">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="black">
          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
      </button>

    </div>

    <!-- Divisor -->
    <p class="text-white text-sm">ou cadastre seu email</p>

    <!-- Formulário -->
    <div class="w-full flex flex-col gap-3">

      <!-- Input Nome -->
      <input
        type="text"
        placeholder="Nome"
        class="w-full bg-white text-gray-400 placeholder-gray-400 px-4 py-3 rounded focus:outline-none focus:ring-2 focus:ring-white text-sm"
      />

      <!-- Input Email -->
      <input
        type="email"
        placeholder="Email"
        class="w-full bg-white text-gray-400 placeholder-gray-400 px-4 py-3 rounded focus:outline-none focus:ring-2 focus:ring-white text-sm"
      />

      <!-- Input Senha -->
      <input
        type="password"
        placeholder="Senha"
        class="w-full bg-white text-gray-400 placeholder-gray-400 px-4 py-3 rounded focus:outline-none focus:ring-2 focus:ring-white text-sm"
      />

    </div>

    <!-- Botão Cadastrar -->
    <button class="w-full border-2 border-white text-white font-bold tracking-widest py-3 rounded-full hover:bg-white hover:text-red-500 transition-colors text-sm">
      CADASTRAR
    </button>

    <!-- Link de login -->
    <p class="text-white text-sm">
      Já tem conta?
      <a href="#" class="font-bold hover:underline">Login</a>
    </p>

  </main>

</body>

</html>
